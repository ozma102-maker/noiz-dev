<!DOCTYPE html>

<html lang="ko">
<head><meta content="#c6ff00" name="theme-color"/><meta content="default" name="apple-mobile-web-app-status-bar-style"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>NOIZ!</title>
<style>
  :root{
    --bg:#c6ff00;
    --paper:rgba(255,255,255,.16);
    --ink:#3f5d7f;
    --muted:#58779a;
    --line:rgba(63,93,127,.26);
    --white:#f7f8f2;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",Segoe UI,sans-serif;letter-spacing:-.04em}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1180px;margin:0 auto;padding:30px 22px 72px}
  header{display:grid;grid-template-columns:1fr;gap:20px;align-items:end;padding:4px 0 24px;border-bottom:1px solid var(--line)}
  .logo{font-size:78px;font-weight:850;letter-spacing:-.09em;line-height:.88;margin:0;color:var(--ink)}
  .logo .dot{display:inline-block;margin-left:.04em}
  .tag{font-size:20px;font-weight:850;color:var(--ink);line-height:1.2;margin:18px 0 0;max-width:760px;letter-spacing:-.055em}
  .stamp{text-align:right;font-size:12px;color:var(--muted);line-height:1.45}.stamp b{display:block;color:var(--ink);font-size:15px;margin-bottom:2px}
  .hero{display:grid;grid-template-columns:1fr;gap:14px;margin:22px 0 18px}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:28px;padding:22px}
  .panel h2{margin:0 0 9px;font-size:28px;font-weight:850;letter-spacing:-.06em;color:var(--ink)}.panel p{margin:0;color:var(--muted);line-height:1.68;font-size:15px;font-weight:650}
  .rank-list{display:grid;gap:14px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:30px;padding:18px;display:grid;grid-template-columns:84px 1fr;gap:18px}
  .rank{height:72px;width:72px;border-radius:20px;background:rgba(255,255,255,.48);color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:850;font-size:24px;letter-spacing:-.08em}
  .head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
  .meta{font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:760}
  .title{font-size:25px;font-weight:850;letter-spacing:-.07em;margin:0 0 5px;color:var(--ink)}
  .owner{font-size:15px;color:var(--ink);line-height:1.48;font-weight:760}
  .place{font-size:13px;color:var(--muted);margin-top:5px;font-weight:700}

  .title-link{display:inline;text-decoration:none;color:var(--ink)}
  .title-link:hover{text-decoration:underline;text-underline-offset:.13em}
  .place-link{display:inline;color:var(--muted);text-decoration:underline;text-underline-offset:.18em;text-decoration-thickness:1px;font-weight:760}
  .place-link:hover{color:var(--ink)}

  .scorebox{text-align:right;min-width:92px}
  .score{font-size:42px;font-weight:880;line-height:.88;letter-spacing:-.08em;color:var(--ink)}
  .score-label{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:var(--muted);margin-top:7px;font-weight:760}
  .meter{margin:17px 0 12px}
  .meter-top{display:flex;justify-content:flex-start;align-items:center;font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:760;gap:12px;flex-wrap:wrap}
  .meter-track{height:16px;border-radius:999px;background:rgba(63,93,127,.12);border:1px solid rgba(63,93,127,.2);overflow:hidden;position:relative}
  .meter-fill{height:100%;width:var(--noise);border-radius:999px;background:currentColor;opacity:.92}
  .mood{display:inline-flex;align-items:center;gap:7px;color:var(--ink);font-weight:800}
  .mood svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  .desc{font-size:14px;line-height:1.68;color:var(--ink);margin:10px 0 13px;font-weight:660}
  .signals{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
  .sig{font-size:11px;border-radius:999px;background:rgba(255,255,255,.35);border:1px solid var(--line);padding:6px 8px;color:var(--ink);font-weight:720}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.34);color:var(--ink);border-radius:999px;padding:10px 12px;font-size:13px;font-weight:780}
  .btn.primary{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .btn:hover{transform:translateY(-1px)}
  .foot{margin-top:24px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.65}.foot b{color:var(--ink)}
  .status{margin:14px 0 0;font-size:12px;color:var(--muted);font-weight:700}
  @media (max-width:760px){.wrap{padding:24px 13px 52px}.logo{font-size:56px}header{grid-template-columns:1fr}.stamp{text-align:left}.card{grid-template-columns:1fr;gap:13px}.rank{height:54px;width:64px;border-radius:17px;font-size:21px}.head{display:block}.scorebox{text-align:left;margin-top:12px;display:flex;align-items:end;gap:8px}.score{font-size:38px}.title{font-size:23px}.tag{font-size:15px}}

  .score-mood{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:9px;font-size:13px;font-weight:850;color:var(--ink);line-height:1}
  .score-mood svg{width:18px;height:18px;flex:0 0 auto}

  .score-mood svg{fill:none!important;stroke:currentColor!important}
  .score-mood svg *{fill:none!important;stroke:currentColor!important}

  /* v34 mobile: score block in content flow above meter */
  @media (max-width:720px){
    .card{
      display:grid!important;
      grid-template-columns:1fr!important;
      gap:13px!important;
      padding:18px!important;
      position:relative!important;
    }

    .rank{
      width:62px!important;
      height:62px!important;
      min-width:62px!important;
      border-radius:19px!important;
      font-size:25px!important;
      line-height:1!important;
      align-self:start!important;
      justify-self:start!important;
    }

    .head{
      display:block!important;
      min-height:0!important;
      padding-right:0!important;
    }

    .head > div:first-child{
      min-width:0!important;
    }

    .scorebox{
      position:static!important;
      width:auto!important;
      min-width:0!important;
      display:grid!important;
      grid-template-columns:auto auto!important;
      grid-template-rows:auto auto!important;
      column-gap:9px!important;
      row-gap:0!important;
      align-items:end!important;
      justify-content:start!important;
      text-align:left!important;
      margin:22px 0 0 0!important;
      transform:none!important;
    }

    .score{
      grid-column:1!important;
      grid-row:1!important;
      font-size:42px!important;
      line-height:.78!important;
      letter-spacing:-.075em!important;
      font-weight:900!important;
    }

    .score-label{
      grid-column:2!important;
      grid-row:1!important;
      margin:0 0 6px 0!important;
      font-size:7.5px!important;
      line-height:1!important;
      letter-spacing:.055em!important;
      white-space:nowrap!important;
      text-align:left!important;
      font-weight:850!important;
    }

    .score-mood{
      grid-column:1 / -1!important;
      grid-row:2!important;
      margin-top:9px!important;
      display:flex!important;
      align-items:center!important;
      justify-content:flex-start!important;
      gap:5px!important;
      font-size:12px!important;
      line-height:1!important;
      letter-spacing:-.02em!important;
      white-space:nowrap!important;
      font-weight:850!important;
      color:var(--ink)!important;
    }

    .score-mood svg{
      width:14px!important;
      height:14px!important;
      display:block!important;
      flex:0 0 auto!important;
      fill:none!important;
      stroke:currentColor!important;
      stroke-width:2.05!important;
    }

    .score-mood svg *{
      fill:none!important;
      stroke:currentColor!important;
    }

    .meta{
      margin-top:0!important;
      font-size:14px!important;
      line-height:1.28!important;
      max-width:100%!important;
    }

    .title{
      max-width:100%!important;
      margin-top:8px!important;
      padding-right:0!important;
      font-size:clamp(28px,8.4vw,38px)!important;
      line-height:1.03!important;
      letter-spacing:-.065em!important;
    }

    .owner,
    .art-overview{
      margin-top:10px!important;
      font-size:18px!important;
      line-height:1.34!important;
      max-width:100%!important;
      padding-right:0!important;
    }

    .place{
      margin-top:8px!important;
      font-size:15px!important;
      line-height:1.28!important;
      max-width:100%!important;
    }

    .meter{
      margin-top:10px!important;
      margin-bottom:14px!important;
    }

    .meter-track{
      height:16px!important;
    }
  }

  @media (max-width:420px){
    .rank{
      width:58px!important;
      height:58px!important;
      min-width:58px!important;
      border-radius:18px!important;
      font-size:23px!important;
    }

    .scorebox{
      margin-top:21px!important;
      column-gap:8px!important;
    }

    .score{
      font-size:39px!important;
    }

    .score-label{
      font-size:7px!important;
      letter-spacing:.05em!important;
      margin-bottom:5px!important;
    }

    .score-mood{
      font-size:11px!important;
      gap:4px!important;
      margin-top:8px!important;
    }

    .score-mood svg{
      width:13px!important;
      height:13px!important;
    }
  }

  /* v46 flat archive date navigation */
  .week-nav{display:flex;align-items:center;gap:8px;margin-top:18px}
  .week-nav .tag{margin:0}
  .week-arrow{
    appearance:none;
    border:0;
    background:transparent;
    color:var(--ink);
    width:22px;
    height:26px;
    padding:0;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:620;
    line-height:1;
    cursor:pointer;
    opacity:.78;
    transition:opacity .12s ease, transform .12s ease;
  }
  .week-arrow:hover:not(:disabled){opacity:1;transform:translateY(-1px)}
  .week-arrow:disabled{opacity:.18;cursor:default}
  .archive-state{display:none!important}
  @media (max-width:720px){
    .week-nav{gap:6px;margin-top:16px}
    .week-arrow{width:20px;height:24px;font-size:21px}
  }

  /* v55 transparent rolling dice icon */
  header{position:relative}
  html{background:var(--bg)}
  body{background:var(--bg)}
  .theme-shuffle{
    position:absolute;
    top:6px;
    right:0;
    width:38px;
    height:34px;
    padding:0;
    border:0!important;
    outline:0;
    box-shadow:none!important;
    background:transparent!important;
    color:var(--ink);
    opacity:.74;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:opacity .12s ease, transform .12s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .theme-shuffle:hover{opacity:1;transform:translateY(-1px)}
  .theme-shuffle:active{transform:translateY(0) scale(.96)}
  .theme-shuffle svg{
    width:31px;
    height:31px;
    display:block;
    overflow:visible;
    transform-origin:50% 50%;
  }
  .theme-shuffle rect{fill:transparent!important;stroke:currentColor!important;stroke-width:2.8!important}
  .theme-shuffle .pip{
    fill:currentColor;
    stroke:none;
    transform-origin:center;
  }
  .theme-shuffle.is-rolling svg{
    animation:noizDiceRoll .56s cubic-bezier(.18,.86,.2,1);
  }
  .theme-shuffle.is-rolling .pip{
    animation:noizPipPop .18s ease-in-out infinite alternate;
  }
  @keyframes noizDiceRoll{
    0%{transform:translateX(0) rotate(0deg) scale(1)}
    18%{transform:translateX(2px) rotate(82deg) scale(.9)}
    40%{transform:translateX(-2px) rotate(174deg) scale(1.08)}
    65%{transform:translateX(1px) rotate(276deg) scale(.95)}
    100%{transform:translateX(0) rotate(360deg) scale(1)}
  }
  @keyframes noizPipPop{
    0%{opacity:.35;transform:scale(.72)}
    100%{opacity:1;transform:scale(1)}
  }
  @media (max-width:720px){
    .theme-shuffle{
      top:4px;
      right:0;
      width:34px;
      height:31px;
    }
    .theme-shuffle svg{
      width:28px;
      height:28px;
    }
  }
  @media (prefers-reduced-motion: reduce){
    .theme-shuffle.is-rolling svg,
    .theme-shuffle.is-rolling .pip{animation:none!important}
  }

  /* v56 visible borderless dice pips */
  .theme-shuffle svg{width:33px!important;height:33px!important}
  .theme-shuffle .pip{
    fill:currentColor!important;
    stroke:none!important;
    opacity:1!important;
  }
  @media (max-width:720px){
    .theme-shuffle svg{width:31px!important;height:31px!important}
  }

  /* v57 visible dice outline */
  .theme-shuffle .dice-outline{
    fill:transparent!important;
    stroke:currentColor!important;
    stroke-width:2.8!important;
  }
  .theme-shuffle .pip{
    fill:currentColor!important;
    stroke:none!important;
    opacity:1!important;
  }

  /* v63 small title-side service descriptor */
  .logo-row{
    display:flex;
    align-items:flex-end;
    gap:14px;
    flex-wrap:wrap;
  }
  .logo-subtitle{
    margin:0 0 7px;
    color:var(--ink);
    font-size:15px;
    font-weight:760;
    line-height:1;
    letter-spacing:-.045em;
    white-space:nowrap;
    opacity:.92;
  }
  @media (max-width:720px){
    .logo-row{
      gap:8px;
      align-items:flex-end;
    }
    .logo-subtitle{
      margin:0 0 5px;
      font-size:11.5px;
      letter-spacing:-.04em;
    }
  }

  /* v70 title-side period + fixed representative landing color */
  .title-period{
    display:inline-flex;
    align-items:center;
    margin-left:10px;
    color:var(--muted);
    font-size:12px;
    font-weight:780;
    line-height:1.1;
    letter-spacing:-.035em;
    vertical-align:middle;
    white-space:nowrap;
  }
  @media (max-width:720px){
    .title-period{
      display:block;
      margin:5px 0 0;
      font-size:11.5px;
    }
  }

  /* v78 decibel waveform gauge */
  .meter-fill{
    position:relative;
    overflow:hidden;
    background:transparent;
  }
  .meter-fill::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    background:currentColor;
    opacity:.18;
  }
  .meter-fill::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    background:
      radial-gradient(circle at 0% 50%, currentColor 0 1px, transparent 2px 100%),
      repeating-radial-gradient(ellipse at 0% 50%, transparent 0 10px, currentColor 11px 12px, transparent 13px 22px);
    opacity:.18;
    animation:wavePulse 2.8s ease-in-out infinite;
    transform-origin:left center;
  }
  .meter-wave{
    position:absolute;
    inset:3px 8px;
    display:flex;
    align-items:center;
    gap:3px;
    z-index:2;
    pointer-events:none;
  }
  .meter-wave span{
    flex:1 1 0;
    min-width:2px;
    max-width:5px;
    height:var(--h, 44%);
    border-radius:999px;
    background:currentColor;
    opacity:.88;
    transform:scaleY(.9);
    transform-origin:center;
    animation:barWave 1.65s ease-in-out infinite;
    animation-delay:var(--d, 0s);
  }
  @keyframes barWave{
    0%, 100%{transform:scaleY(.58);opacity:.56}
    45%{transform:scaleY(1.05);opacity:.96}
  }
  @keyframes wavePulse{
    0%,100%{opacity:.10;transform:scaleX(.98)}
    50%{opacity:.24;transform:scaleX(1.03)}
  }
  @media (prefers-reduced-motion: reduce){
    .meter-wave span,
    .meter-fill::after{
      animation:none;
    }
  }


  /* v79 smoke-like audio waveform gauge */
  .meter-track{
    height:34px;
    border-radius:999px;
    background:rgba(0,0,0,.075);
    border:1px solid var(--line);
    overflow:hidden;
    position:relative;
  }
  .meter-fill{
    position:relative;
    height:100%;
    width:var(--noise);
    border-radius:999px;
    background:transparent;
    overflow:hidden;
    opacity:1;
    isolation:isolate;
  }
  .meter-fill::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    background:
      linear-gradient(90deg, currentColor, transparent 72%),
      currentColor;
    opacity:.10;
    z-index:0;
  }
  .meter-fill::after{
    display:none;
  }
  .meter-wave-svg{
    position:absolute;
    left:-50%;
    top:-22%;
    width:210%;
    height:144%;
    z-index:2;
    overflow:visible;
    animation:waveDrift var(--wave-speed, 2s) linear infinite;
    filter:drop-shadow(0 0 6px currentColor);
    opacity:.96;
    pointer-events:none;
  }
  .wave-soft{
    fill:none;
    stroke:currentColor;
    stroke-width:7.5;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:.18;
    vector-effect:non-scaling-stroke;
  }
  .wave-mid{
    fill:none;
    stroke:currentColor;
    stroke-width:3.2;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:.34;
    vector-effect:non-scaling-stroke;
  }
  .wave-core{
    fill:none;
    stroke:currentColor;
    stroke-width:1.45;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:.82;
    vector-effect:non-scaling-stroke;
  }
  .wave-secondary{
    fill:none;
    stroke:currentColor;
    stroke-width:1.15;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:.36;
    vector-effect:non-scaling-stroke;
    animation:waveFlicker calc(var(--wave-speed, 2s) * .72) ease-in-out infinite;
  }
  @keyframes waveDrift{
    from{transform:translateX(0)}
    to{transform:translateX(24%)}
  }
  @keyframes waveFlicker{
    0%,100%{opacity:.22}
    50%{opacity:.52}
  }
  @media (prefers-reduced-motion: reduce){
    .meter-wave-svg,
    .wave-secondary{
      animation:none;
    }
  }
  @media (max-width:720px){
    .meter-track{height:30px}
    .wave-soft{stroke-width:6.2}
  }


  /* v80 compact single-line waveform gauge */
  .meter-track{
    height:20px;
    border-radius:999px;
    background:rgba(0,0,0,.07);
    border:1px solid var(--line);
    overflow:hidden;
    position:relative;
  }
  .meter-fill{
    position:relative;
    height:100%;
    width:var(--noise);
    border-radius:999px;
    background:transparent;
    overflow:hidden;
    opacity:1;
  }
  .meter-fill::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    background:currentColor;
    opacity:.08;
    z-index:0;
  }
  .meter-fill::after{
    display:none;
  }
  .meter-wave-svg{
    position:absolute;
    left:-44%;
    top:50%;
    width:205%;
    height:54px;
    z-index:2;
    overflow:visible;
    transform:translateY(-50%);
    animation:singleWaveDrift var(--wave-speed, 2s) linear infinite;
    pointer-events:none;
  }
  .wave-line{
    fill:none;
    stroke:currentColor;
    stroke-width:2.1;
    stroke-linecap:round;
    stroke-linejoin:round;
    opacity:.9;
    vector-effect:non-scaling-stroke;
    filter:drop-shadow(0 0 2px currentColor);
  }
  @keyframes singleWaveDrift{
    0%{transform:translate(0, calc(-50% - var(--wave-bounce, 0px)))}
    25%{transform:translate(6%, -50%)}
    50%{transform:translate(12%, calc(-50% + var(--wave-bounce, 0px)))}
    75%{transform:translate(18%, -50%)}
    100%{transform:translate(24%, calc(-50% - var(--wave-bounce, 0px)))}
  }
  @media (prefers-reduced-motion: reduce){
    .meter-wave-svg{animation:none}
  }
  @media (max-width:720px){
    .meter-track{height:18px}
    .wave-line{stroke-width:1.8}
  }


  /* v81 NOIZ-style decibel signal gauge */
  .meter-track{
    height:18px;
    border-radius:999px;
    background:rgba(0,0,0,.075);
    border:1px solid var(--line);
    overflow:hidden;
    position:relative;
  }
  .meter-fill{
    position:relative;
    height:100%;
    width:var(--noise);
    border-radius:999px;
    background:currentColor;
    opacity:.88;
    overflow:hidden;
  }
  .meter-fill::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    background:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,.34) 0 1px,
        transparent 1px 7px
      );
    mix-blend-mode:screen;
    opacity:.42;
    z-index:1;
  }
  .meter-fill::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    background:linear-gradient(90deg, transparent 0 18%, rgba(255,255,255,.55) 46%, transparent 74% 100%);
    transform:translateX(-115%);
    animation:signalSweep var(--signal-speed, 2s) ease-in-out infinite;
    opacity:.38;
    z-index:3;
  }
  .meter-signal{
    position:absolute;
    inset:3px 9px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:3px;
    z-index:2;
    pointer-events:none;
  }
  .meter-signal span{

function randomTheme(excludeId = null) {
  if (!THEME_POOL.length) return DEFAULT_THEME;
  const candidates = THEME_POOL.filter(theme => theme.id !== excludeId);
  const pool = candidates.length ? candidates : THEME_POOL;
  let index = 0;
  if (window.crypto && crypto.getRandomValues) {
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    index = arr[0] % pool.length;
  } else {
    index = Math.floor((Math.random() * pool.length + Date.now()) % pool.length);
  }
  return pool[index];
}

  if (window.crypto && crypto.getRandomValues) {

    crypto.getRandomValues(arr);
    return arr[0] % max;

function applyColorTheme(theme = DEFAULT_THEME) {

function escapeHtml(str = "") {
  return String(str).replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[ch]));
}

function hasLowInfo(item) {
  const signals = (item.signals || []).join(" ");
  return item.infoVolume === "low" || item.lowInfo === true || signals.includes("후기 축적 전") || signals.includes("후기 부족");
}

function moodInfo(favorability, item = {}) {
  if (hasLowInfo(item)) return { icon: "neutral", label: "후기 축적 중" };

  const score = Number(favorability ?? 60);
  if (score >= 80) return { icon: "sunglasses", label: "매우 긍정적 반응" };

  return { icon: "frown", label: "대체로 부정적 반응" };
}

function isRankable(item) {
  const signals = (item.signals || []).join(" ");
  const status = String(item.status || item.openStatus || "").toLowerCase();

  const lowInfo =
    item.infoVolume === "low" ||
    item.lowInfo === true ||
    signals.includes("후기 축적 전") ||
    signals.includes("후기 부족");

  const notOpenOrNoReaction =
    signals.includes("오픈 예정") ||
    signals.includes("반응 없음") ||
    status.includes("upcoming") ||
    status.includes("preopen") ||
    status.includes("pre-open");

  return !(lowInfo || notOpenOrNoReaction);
}


function formatDate(iso) {
  if (!iso) return "업데이트 시간 확인 불가";
  try {
    const date = new Date(iso);
    return new Intl.DateTimeFormat("ko-KR", {
      timeZone: "Asia/Seoul",
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit"
    }).format(date) + " 기준";
  } catch {
    return iso;
  }
}


function formatWeekLabel(iso) {
  const date = iso ? new Date(iso) : new Date();
  const months = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Seoul",
    year: "numeric",
    month: "numeric",
    day: "numeric",
    hour: "numeric",
    hour12: false
  }).formatToParts(date);

  const year = Number(parts.find(p => p.type === "year").value);
  const month = Number(parts.find(p => p.type === "month").value);
  const day = Number(parts.find(p => p.type === "day").value);
  const hour = Number(parts.find(p => p.type === "hour").value);

  // Week labels roll over every Monday at 09:00 KST.
  // Example: 2026-07-06 09:00 KST -> 2026 July week 2.
  let rollovers = 0;
  for (let d = 1; d <= day; d += 1) {
    const weekday = new Date(Date.UTC(year, month - 1, d, 12)).getUTCDay(); // 1 = Monday
    if (weekday !== 1) continue;
    if (d < day || (d === day && hour >= 9)) {
      rollovers += 1;
    }
  }

  const week = 1 + rollovers;
  return `${year} ${months[month - 1]} week ${week}`;
}



function formatPeriodDatePart(iso, includeYear = false) {
  if (!iso) return "";
  const str = String(iso).trim();
  const normalized = str.replace(/\./g, "-").replace(/\//g, "-");
  const parts = normalized.split("-").filter(Boolean);
  if (parts.length >= 3) {
    const [year, month, day] = parts;
    return includeYear ? `${year}.${String(month).padStart(2, "0")}.${String(day).padStart(2, "0")}` : `${String(month).padStart(2, "0")}.${String(day).padStart(2, "0")}`;
  }
  return str;
}

function formatExperiencePeriod(item = {}) {
  const explicit = item.period || item.dateRange || item.displayPeriod;
  if (explicit) return String(explicit);
  const start = item.start || item.startDate || item.openDate;
  const end = item.end || item.endDate || item.closeDate;
  if (!start && !end) return "";
  if (start && end) {
    const startYear = String(start).slice(0, 4);
    const endYear = String(end).slice(0, 4);
    if (startYear && endYear && startYear === endYear) {
      return `${formatPeriodDatePart(start, true)}–${formatPeriodDatePart(end, false)}`;
    }
    return `${formatPeriodDatePart(start, true)}–${formatPeriodDatePart(end, true)}`;
  }
  if (start) return `${formatPeriodDatePart(start, true)}–`;
  return `–${formatPeriodDatePart(end, true)}`;
}

function reactionWaveSettings(item = {}) {
  if (hasLowInfo(item)) {
    return { speed: "3.2s", amp: .42, bounce: "0.4px" };
  }
  const score = Number(item.favorability ?? 60);
  if (score >= 80) return { speed: "1.2s", amp: 1.18, bounce: "3.0px" };   // 매우 긍정적 반응
  if (score >= 70) return { speed: "1.65s", amp: .92, bounce: "2.1px" };  // 긍정적 반응
  if (score >= 50) return { speed: "2.15s", amp: .68, bounce: "1.25px" }; // 복합적 반응
  return { speed: "2.9s", amp: .46, bounce: "0.7px" };                   // 대체로 부정적 반응
}

function waveformPath(noiz = 0, amplitudeScale = 1) {
  const score = Math.max(0, Math.min(100, Number(noiz || 0)));
  const amp = (3.8 + score * 0.055) * amplitudeScale;
  const width = 260;
  const center = 30;
  const points = [];

  for (let i = 0; i <= 88; i += 1) {
    const x = (i / 88) * width;
    const t = (i / 88) * Math.PI * 8.7;
    const y =
      center +
      Math.sin(t) * amp +
      Math.sin(t * 2.18 + 1.1) * amp * .32 +
      Math.cos(t * .72 + score * .05) * amp * .2;
    points.push(`${i === 0 ? "M" : "L"}${x.toFixed(1)} ${y.toFixed(1)}`);
  }

  return points.join(" ");
}

function decibelWaveSvg(item = {}) {
  const noiz = Math.max(0, Math.min(100, Number(item.noiz || 0)));
  const settings = reactionWaveSettings(item);
  const path = waveformPath(noiz, settings.amp);
  return `
    <svg class="meter-wave-svg" viewBox="0 0 260 60" preserveAspectRatio="none" style="--wave-speed:${settings.speed};--wave-bounce:${settings.bounce}" aria-hidden="true">
      <path class="wave-line" d="${path}"></path>
    </svg>
  `;
}


function reactionSignalSettings(item = {}) {

  if (score >= 70) {

      amp: .88,
      count: 36,
      gap: "5px",

  if (score >= 50) {
    return {

      amp: .56,
      count: 30,

    };
  }

  return {

    speed: "2.95s",
    scale: "1.04",
    amp: .34,
    count: 24,
    gap: "8px",
    tickWidth: "1.35px",
    tickWidthPc: "1.2px"
  };
}

function decibelSignalMarkup(item = {}) {
  const noiz = Math.max(0, Math.min(100, Number(item.noiz || 0)));
  const settings = reactionSignalSettings(item);
  const count = settings.count || 30;
  const ticks = Array.from({ length: count }, (_, i) => {
    const t = i / Math.max(1, count - 1);
    const wave = Math.sin((t * Math.PI * 7.2) + noiz * .08);
    const counter = Math.cos((t * Math.PI * 3.1) + noiz * .05);
    const raw = 30 + (wave * 26 + counter * 13) * settings.amp + noiz * .24;
    const height = Math.max(18, Math.min(98, Math.round(raw)));
    const delay = ((i % 11) * 0.038).toFixed(3);
    return `<span style="--h:${height}%;--d:${delay}s"></span>`;
  }).join("");

  return `
    <div class="meter-signal" style="
      --signal-speed:${settings.speed};
      --signal-scale:${settings.scale};
      --signal-tick-gap:${settings.gap};
      --signal-tick-width:${settings.tickWidth};
      --signal-tick-width-pc:${settings.tickWidthPc};
      --signal-tick-opacity:${settings.opacity};
      --signal-grid-alpha:${settings.gridAlpha};
      --signal-grid-opacity:${settings.gridOpacity};
      --signal-sweep-opacity:${settings.sweepOpacity};
    ">${ticks}</div>
  `;
}

function renderItem(item, index) {
  const rank = item.rank || index + 1;
  const mood = moodInfo(item.favorability, item);
  const sourceUrl = item.sourceUrl || "#";
  const mapQuery = item.mapQuery || `${item.venue || ""} ${item.area || ""}`;
  const signals = (item.signals || []).map(s => `<span class="sig">${escapeHtml(s)}</span>`).join("");
  const period = formatExperiencePeriod(item);
  const periodHtml = period ? `<span class="title-period">${escapeHtml(period)}</span>` : "";
  return `
    <article class="card">
      <div class="rank">#${rank}</div>
      <div>
        <div class="head">
          <div>
            <div class="meta">${escapeHtml(item.brand || item.ownerName || "")}</div>
            <h2 class="title"><a class="title-link" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(item.title || "Untitled")}</a>${periodHtml}</h2>
            <div class="owner">${escapeHtml(item.owner || "")}</div>
            <div class="place"><a class="place-link" href="${mapUrl(mapQuery)}" target="_blank" rel="noopener">${escapeHtml(item.venue || "")} · ${escapeHtml(item.area || item.region || "")}</a></div>
          </div>
          <div class="scorebox">
            <div class="score">${escapeHtml(item.noiz ?? "")}</div>
            <div class="score-label">DECIBEL</div>\n            <div class="score-mood">${moodIconSvg(mood.icon)}<span>${mood.label}</span></div>
          </div>
        </div>
        <div class="meter">
          <div class="meter-track"><div class="meter-fill" style="--noise:${Math.max(0, Math.min(100, Number(item.noiz || 0)))}%;--signal-speed:${reactionSignalSettings(item).speed};--signal-opacity:${reactionSignalSettings(item).opacity};">${decibelSignalMarkup(item)}</div></div>
        </div>
        <p class="desc">${escapeHtml(item.description || "")}</p>
        <div class="signals">${signals}</div>

      </div>
    </article>
  `;
}




function setupHiddenArtMode() {
  const logo = document.querySelector(".logo");
  if (!logo) return;

  let taps = [];
  logo.style.cursor = "pointer";
  logo.addEventListener("pointerup", () => {
    const now = Date.now();
    taps = taps.filter(t => now - t < 900);
    taps.push(now);

    if (taps.length >= 3) {
      taps = [];
      window.location.href = "./art.html";
    }
  });
}


function topEntries(obj, limit = 3) {
  return Object.entries(obj || {}).sort((a, b) => b[1] - a[1]).slice(0, limit).map(([k]) => k);
}

function countBy(items, fn) {
  return items.reduce((acc, item) => {
    const key = fn(item);
    if (key) acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
}

function includesAny(text, words) {
  const lower = String(text || "").toLowerCase();
  return words.some(w => lower.includes(String(w).toLowerCase()));
}

function classifyMainItem(item) {
  const category = String(item.category || item.type || "").toLowerCase();
  if (["exhibition", "culture", "art", "museum"].some(x => category.includes(x))) return "전시/문화 경험";
  if (["popup", "brand", "retail"].some(x => category.includes(x))) return "팝업/브랜드 경험";

  const title = String(item.title || "");
  const brand = String(item.brand || item.owner || "");
  const signals = (item.signals || []).join(" ");
  const description = String(item.description || "");
  const strongText = [title, brand, signals].join(" ");
  const allText = [strongText, description].join(" ");

  const exhibitionStrongWords = [
    "개인전", "기획전", "미술관", "전시", "명작전", "회고전", "회고", "작가",
    "서울시립미술관", "그라운드시소", "도슨트", "유영국", "렘브란트", "고야"
  ];
  const popupStrongWords = [
    "팝업", "POP UP", "popup", "팝업스토어", "스토어", "굿즈", "IP 팬덤", "캐릭터",
    "브랜드 체험", "제품 탐색", "구매 욕구", "이벤트", "더현대", "T1", "SK텔레콤", "GS25", "돈키호테", "NH농협", "마른파이브"
  ];

  if (includesAny(strongText, exhibitionStrongWords)) return "전시/문화 경험";
  if (includesAny(strongText, popupStrongWords)) return "팝업/브랜드 경험";
  if (includesAny(allText, ["팝업", "POP UP", "popup", "굿즈", "한정", "브랜드 체험", "제품 탐색", "구매 욕구"])) return "팝업/브랜드 경험";
  if (includesAny(allText, ["전시", "미술", "관람", "작품", "작가", "회화", "사진", "조각"])) return "전시/문화 경험";
  return "공간 경험";
}

function buildNoizWeeklyAnalysis(items, data = {}) {
  const list = (items || []).filter(Boolean);
  if (!list.length) return data.weekly_read || "이번 주는 아직 잡히는 신호가 많지 않아. 조금 더 쌓이면 바로 읽어볼게!";

  const areas = countBy(list, item => item.area || item.region || "서울/수도권");
  const types = countBy(list, classifyMainItem);
  const topAreas = topEntries(areas, 3).join("·");
  const top = list[0];

  const popupCount = types["팝업/브랜드 경험"] || 0;
  const artCount = types["전시/문화 경험"] || 0;

  const signalText = list.map(item => [...(item.signals || []), item.description || "", item.title || "", item.brand || ""].join(" ")).join(" ");
  const hasGoods = includesAny(signalText, ["굿즈", "한정", "팬덤", "IP", "캐릭터"]);
  const hasWait = includesAny(signalText, ["웨이팅", "혼잡", "줄", "대기", "더현대"]);
  const hasFree = includesAny(signalText, ["무료", "체험", "이벤트"]);
  const hasBigShows = includesAny(signalText, ["미술관", "명작", "거장", "기관", "도슨트", "기획전"]);

  let why = "관심은 단순 정보 탐색보다, 바로 가볼 수 있고 짧게 즐길 수 있는 경험 쪽으로 모이는 분위기야.";
  if (popupCount > artCount && (hasGoods || hasFree)) {
    why = "관심이 모이는 이유는 굿즈, 한정성, 무료 체험처럼 바로 움직이게 만드는 요소가 강하기 때문이야.";
  } else if (artCount >= popupCount && hasBigShows) {
    why = "관심이 모이는 이유는 검증된 작가명, 기관 전시, 명확한 관람 목적처럼 실패 확률이 낮은 문화 경험이 강하기 때문이야.";
  }

  let environment = "전체적으로는 상권형 팝업과 전시형 문화 경험이 같은 주말 시간을 두고 경쟁하는 분위기야.";
  if (popupCount >= 5) {
    environment = "전체 환경은 성수·더현대식 팝업 경쟁이 강하고, 관객은 오래 머무는 전시보다 짧고 인증하기 좋은 방문 경험에 빠르게 반응하는 흐름이야.";
  } else if (artCount >= 5) {
    environment = "전체 환경은 대형 전시와 미술관 동선의 비중이 높고, 관객은 검증된 콘텐츠를 중심으로 주말 일정을 짜는 흐름이야.";
  }

  const congestion = hasWait ? "다만 웨이팅·혼잡 신호도 같이 보여. 화제성은 높지만 방문 피로도는 꼭 같이 봐야 해!" : "혼잡 신호는 상대적으로 약해. 이번 주는 화제성 대비 접근성이 꽤 괜찮아 보여!";

  const listName = list.length >= 10 ? "Top 10" : "상위 후보";
  return `이번 주 NOIZ는 ${topAreas || "서울/수도권"} 중심으로 잡혀. ${listName}는 팝업/브랜드 경험 ${popupCount}개, 전시/문화 경험 ${artCount}개가 섞여 있고, 가장 강한 신호는 ${top.title || "상위 후보"} 쪽이야. ${why} ${environment} ${congestion}`;
}


function dateKeyFromIso(iso = "") {
  return String(iso || "").slice(0, 10);
}

function archiveUrl(dateKey) {
  const entry = archiveEntries.find(item => item.date === dateKey);
  return entry?.file || `./data/archive/noiz-week-${encodeURIComponent(dateKey)}.json`;
}

function currentRequestedArchiveDate() {
  const params = new URLSearchParams(window.location.search);
  return params.get("date") || params.get("archive") || null;
}


function markWeekThemeShuffle() {
  try {
    window.sessionStorage.setItem("noiz-week-theme-shuffle", "1");
  } catch {
    // sessionStorage can be unavailable in some browser modes.
  }
}

function shouldShuffleThemeAfterWeekChange() {
  try {
    const key = "noiz-week-theme-shuffle";
    const value = window.sessionStorage.getItem(key);
    if (value === "1") {
      window.sessionStorage.removeItem(key);
      return true;
    }
  } catch {
    // Keep default lime if sessionStorage is unavailable.
  }
  return false;
}

function setArchiveUrl(dateKey) {
  markWeekThemeShuffle();
  const url = new URL(window.location.href);
  if (dateKey) {
    url.searchParams.set("date", dateKey);
  } else {
    url.searchParams.delete("date");
    url.searchParams.delete("archive");
  }
  window.location.href = url.toString();
}

async function loadArchiveIndex() {
  try {
    const res = await fetch(`${ARCHIVE_INDEX_URL}?t=${Date.now()}`, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const archive = await res.json();
    archiveEntries = (archive.entries || [])
      .filter(entry => entry && entry.date)
      .sort((a, b) => String(a.date).localeCompare(String(b.date)));
  } catch (err) {
    archiveEntries = [];
    console.warn(`아카이브 인덱스 로드 실패: ${err.message}`);
  }
}

function updateArchiveNav(currentDate) {
  const prevBtn = document.getElementById("archivePrev");
  const nextBtn = document.getElementById("archiveNext");
  const state = document.getElementById("archiveState");
  if (!prevBtn || !nextBtn) return;

  const dates = archiveEntries
    .map(entry => entry.date)
    .filter(Boolean)
    .sort();

  prevBtn.onclick = null;
  nextBtn.onclick = null;

  if (!dates.length) {
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  const viewingArchive = Boolean(activeArchiveDate);
  const currentKey = activeArchiveDate || currentDate || null;

  if (!viewingArchive) {
    // Live/current week: previous arrow goes to the most recent saved week.
    prevBtn.disabled = false;
    nextBtn.disabled = true;
    prevBtn.onclick = () => setArchiveUrl(dates[dates.length - 1]);
    return;
  }

  const index = dates.indexOf(currentKey);
  prevBtn.disabled = index <= 0;
  nextBtn.disabled = index < 0;

  prevBtn.onclick = () => {
    if (index > 0) setArchiveUrl(dates[index - 1]);
  };

  nextBtn.onclick = () => {
    if (index >= 0 && index < dates.length - 1) {
      setArchiveUrl(dates[index + 1]);
    } else if (index === dates.length - 1) {
      // Newest archived week → live/current week.
      setArchiveUrl(null);
    }
  };

  if (state) {
  }
}

async function loadData(targetDate = null) {
  activeArchiveDate = targetDate;
  const url = targetDate ? archiveUrl(targetDate) : DATA_URL;

  try {
    const res = await fetch(`${url}?t=${Date.now()}`, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const dataDate = dateKeyFromIso(data.updated_at) || targetDate;

    // weeklyRead is generated after Top 10 ranking.
    document.getElementById("weekLabel").textContent = targetDate
      ? formatWeekLabel(data.updated_at)
      : formatWeekLabel();
    document.getElementById("creator").textContent = data.creator || "이원준 시니어매니저";
    const items = (data.items || [])
      .filter(isRankable)
      .sort((a, b) => Number(b.noiz || 0) - Number(a.noiz || 0))
      .slice(0, 10)
      .map((item, i) => ({ ...item, rank: i + 1 }));
    document.getElementById("weeklyRead").textContent = buildNoizWeeklyAnalysis(items, data);
    document.getElementById("rankList").innerHTML = items.map(renderItem).join("");
    updateArchiveNav(dataDate);
  } catch (err) {
    document.getElementById("weekLabel").textContent = formatWeekLabel();
    updateArchiveNav(targetDate);
    console.warn(`데이터 로드 실패: ${err.message}`);
    document.getElementById("rankList").innerHTML = `
      <article class="card"><div class="rank">!</div><div><h2 class="title">앗, 데이터를 아직 못 불러왔어</h2><p class="desc">로컬 파일로 바로 열면 브라우저 보안 때문에 데이터가 막힐 수 있어. GitHub Pages에 올려서 보면 정상 작동해!</p></div></article>
    `;
  }
}


function animateDiceRoll(button) {
  if (!button) return;
  button.classList.remove("is-rolling");
  void button.offsetWidth;
  button.classList.add("is-rolling");

  let ticks = 0;
  const interval = window.setInterval(() => {
    rollDiceFace();
    ticks += 1;
    if (ticks >= 10) window.clearInterval(interval);
  }, 44);

  window.setTimeout(() => {
    button.classList.remove("is-rolling");
  }, 580);
}

function shuffleThemeNow() {
  const button = document.getElementById("themeShuffle");
  if (button) animateDiceRoll(button);

  const next = randomTheme(currentThemeId);
  // Change the page color immediately so the click always feels responsive.
  applyColorTheme(next);

  window.setTimeout(() => {
    rollDiceFace();
  }, 220);
}

function setupThemeShuffle() {
  const button = document.getElementById("themeShuffle");
  if (!button) return;
  setDiceFace(6);
  button.onclick = shuffleThemeNow;
}

async function initNoizPage() {
  const shuffleOnWeekChange = shouldShuffleThemeAfterWeekChange();
  applyColorTheme(shuffleOnWeekChange ? randomTheme(DEFAULT_THEME.id) : DEFAULT_THEME);
  if (shuffleOnWeekChange) rollDiceFace();
  await loadArchiveIndex();
  await loadData(currentRequestedArchiveDate());
}

setupHiddenArtMode();
setupThemeShuffle();
initNoizPage();
</script>
