<script>
const DATA_URL = "./data/art-noiz-data.json";

function escapeHtml(str = "") {
  return String(str).replace(/[&<>"']/g, ch => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[ch]));
}

function mapUrl(query) {
  return `https://map.naver.com/p/search/${encodeURIComponent(query || "")}`;
}

function hasLowInfo(item) {
  const signals = (item.signals || []).join(" ");
  return item.infoVolume === "low" || item.lowInfo === true || signals.includes("후기 축적 전") || signals.includes("후기 부족");
}

function moodInfo(favorability, item = {}) {
  if (hasLowInfo(item)) return { icon: "neutral", label: "후기 축적 중" };

  const score = Number(favorability ?? 60);
  if (score >= 80) return { icon: "sunglasses", label: "매우 긍정적 반응" };
  if (score >= 70) return { icon: "smile", label: "긍정적 반응" };
  if (score >= 50) return { icon: "neutral", label: "복합적 반응" };
  return { icon: "frown", label: "대체로 부정적 반응" };
}

function isRankable(item) {
  const signals = (item.signals || []).join(" ");
  const status = String(item.status || item.openStatus || "").toLowerCase();
  const reactionCount = Number(item.reactionCount || 0);
  const hasNoReaction =
    item.infoVolume === "low" ||
    item.lowInfo === true ||
    reactionCount <= 0 ||
    signals.includes("후기 축적 전") ||
    signals.includes("후기 부족") ||
    signals.includes("오픈 예정") ||
    signals.includes("반응 없음") ||
    status.includes("upcoming") ||
    status.includes("preopen") ||
    status.includes("pre-open");
  return !hasNoReaction;
}


function formatDate(iso) {
  if (!iso) return "업데이트 시간 확인 불가";
  try {
    const date = new Date(iso);
    return new Intl.DateTimeFormat("ko-KR", {
      timeZone: "Asia/Seoul",
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit"
    }).format(date) + " 기준";
  } catch {
    return iso;
  }
}


function formatWeekLabel(iso) {
  const date = iso ? new Date(iso) : new Date();
  const months = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "Asia/Seoul",
    year: "numeric",
    month: "numeric",
    day: "numeric"
  }).formatToParts(date);
  const year = Number(parts.find(p => p.type === "year").value);
  const month = Number(parts.find(p => p.type === "month").value);
  const day = Number(parts.find(p => p.type === "day").value);
  const week = Math.ceil(day / 7);
  return `${year} ${months[month - 1]} week ${week}`;
}



function formatArtDatePart(iso, includeYear = false) {
  if (!iso) return "";
  const parts = String(iso).split("-");
  if (parts.length < 3) return String(iso);
  const [year, month, day] = parts;
  return includeYear ? `${year}.${month}.${day}` : `${month}.${day}`;
}

function formatExhibitionPeriod(start, end) {
  if (!start && !end) return "";
  if (start && end) {
    const startYear = String(start).slice(0, 4);
    const endYear = String(end).slice(0, 4);
    if (startYear && endYear && startYear === endYear) {
      return `${formatArtDatePart(start, true)}–${formatArtDatePart(end, false)}`;
    }
    return `${formatArtDatePart(start, true)}–${formatArtDatePart(end, true)}`;
  }
  if (start) return `${formatArtDatePart(start, true)}–`;
  return `–${formatArtDatePart(end, true)}`;
}

function artOverview(item) {
  const text = item.overview || item.shortDescription || item.description || "";
  if (!text) return "전시의 형식과 분위기를 간단히 살펴볼 수 있는 미술 전시.";
  return String(text).split(/(?<=다\.)\s|(?<=[.!?。])\s/)[0].slice(0, 120);
}


function moodIconSvg(icon) {
  const common = 'aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
  if (icon === "sunglasses") {
    return `<svg ${common}><circle cx="12" cy="12" r="9"></circle><path d="M6.8 9.2h4.1l-.7 3H7.5l-.7-3Z"></path><path d="M13.1 9.2h4.1l-.7 3h-2.7l-.7-3Z"></path><path d="M10.9 10.6h2.2"></path><path d="M8.7 15.1c.9.8 2 1.25 3.3 1.25s2.4-.45 3.3-1.25"></path></svg>`;
  }
  if (icon === "smile") {
    return `<svg ${common}><circle cx="12" cy="12" r="9"></circle><path d="M8.7 14.2c.8 1.1 1.9 1.7 3.3 1.7s2.5-.6 3.3-1.7"></path><path d="M9 9.5h.01"></path><path d="M15 9.5h.01"></path></svg>`;
  }
  if (icon === "frown") {
    return `<svg ${common}><circle cx="12" cy="12" r="9"></circle><path d="M8.7 15.8c.8-1.1 1.9-1.7 3.3-1.7s2.5.6 3.3 1.7"></path><path d="M9 9.5h.01"></path><path d="M15 9.5h.01"></path></svg>`;
  }
  return `<svg ${common}><circle cx="12" cy="12" r="9"></circle><path d="M8.5 14h7"></path><path d="M9 9.5h.01"></path><path d="M15 9.5h.01"></path></svg>`;
}


function venueMapQuery(item) {
  return String(item.venue || "").trim();
}

function renderItem(item, index) {
  const rank = item.rank || index + 1;
  const mood = moodInfo(item.favorability, item);
  const sourceUrl = item.sourceUrl || "#";
  const mapQuery = venueMapQuery(item);
  const signals = (item.signals || []).map(s => `<span class="sig">${escapeHtml(s)}</span>`).join("");
  const period = formatExhibitionPeriod(item.start, item.end);
  const periodHtml = period ? `<span class="title-period">${escapeHtml(period)}</span>` : "";
  return `
    <article class="card">
      <div class="rank">#${rank}</div>
      <div>
        <div class="head">
          <div>
            <div class="meta">${escapeHtml(item.brand || item.ownerName || "")}</div>
            <h2 class="title"><a class="title-link" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(item.title || "Untitled")}</a>${periodHtml}</h2>
            <div class="owner art-overview">${escapeHtml(artOverview(item))}</div>
            <div class="art-location"><a class="place-link" href="${mapUrl(venueMapQuery(item))}" target="_blank" rel="noopener">${escapeHtml(item.venue || "")} · ${escapeHtml(item.area || item.region || "")}</a></div>
          </div>
          <div class="scorebox">
            <div class="score">${escapeHtml(item.noiz ?? "")}</div>
            <div class="score-label">NOIZ Meter</div>\n            <div class="score-mood">${moodIconSvg(mood.icon)}<span>${mood.label}</span></div>
          </div>
        </div>
        <div class="meter">
          <div class="meter-track"><div class="meter-fill" style="--noise:${Math.max(0, Math.min(100, Number(item.noiz || 0)))}%;"></div></div>
        </div>
        <p class="desc">${escapeHtml(item.description || "")}</p>
        <div class="signals">${signals}</div>

      </div>
    </article>
  `;
}




function setupHiddenArtMode() {
  const logo = document.querySelector(".logo");
  if (!logo) return;

  let taps = [];
  logo.style.cursor = "pointer";
  logo.addEventListener("pointerup", () => {
    const now = Date.now();
    taps = taps.filter(t => now - t < 900);
    taps.push(now);

    if (taps.length >= 3) {
      taps = [];
      window.location.href = "./index.html";
    }
  });
}




function keepArtWeeklyTitleFixed() {
  const weeklyTitle = document.getElementById("weeklyTitle");
  if (weeklyTitle) weeklyTitle.textContent = "What's NOIZy in art now?";
}


function topEntries(obj, limit = 3) {
  return Object.entries(obj || {}).sort((a, b) => b[1] - a[1]).slice(0, limit).map(([k]) => k);
}

function countBy(items, fn) {
  return items.reduce((acc, item) => {
    const key = fn(item);
    if (key) acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
}

function includesAny(text, words) {
  const lower = String(text || "").toLowerCase();
  return words.some(w => lower.includes(String(w).toLowerCase()));
}

function artMedium(item) {
  const text = [item.title, item.brand, item.artist, item.description, item.overview, ...(item.signals || []), ...(item.tags || [])].join(" ").toLowerCase();
  if (includesAny(text, ["회화", "painting", "색면", "추상"])) return "회화";
  if (includesAny(text, ["사진", "photography", "메이플소프"])) return "사진";
  if (includesAny(text, ["조각", "sculpture"])) return "조각";
  if (includesAny(text, ["미디어", "영상", "sound", "사운드"])) return "미디어";
  if (includesAny(text, ["명작", "고야", "렘브란트", "입체주의", "cubist", "modern"])) return "미술사/명작";
  return "동시대미술";
}

function venueTypeKo(item) {
  const vt = item.venueType || "";
  const signals = (item.signals || []).join(" ");
  if (vt === "museum" || signals.includes("미술관")) return "미술관";
  if (vt === "gallery" || signals.includes("갤러리")) return "갤러리";
  if (vt === "nonprofit" || signals.includes("대안공간")) return "대안공간";
  return "전시공간";
}

function buildArtWeeklyAnalysis(items, data = {}) {
  const list = (items || []).filter(Boolean);
  if (!list.length) return data.weekly_read || "현재는 아직 뚜렷하게 잡히는 전시 신호가 많지 않아. 조금 더 쌓이면 바로 읽어볼게!";

  const top = list[0];
  const areas = countBy(list, item => item.area || item.region || "서울/수도권");
  const venues = countBy(list, venueTypeKo);
  const mediums = countBy(list, artMedium);
  const topAreas = topEntries(areas, 3).join("·");
  const topMediums = topEntries(mediums, 2).join("·");

  const museumCount = venues["미술관"] || 0;
  const galleryCount = venues["갤러리"] || 0;
  const paintingCount = mediums["회화"] || 0;
  const photoCount = mediums["사진"] || 0;
  const historyCount = mediums["미술사/명작"] || 0;

  let interest = "관객 관심은 특정 작가 한 명보다, 주말 동선 안에서 여러 전시를 묶어보는 쪽으로 움직이고 있어.";
  if (paintingCount >= 4) {
    interest = "관객 관심은 회화와 색채, 화면 자체의 몰입감처럼 설명보다 먼저 체감되는 전시에 모이는 중이야.";
  } else if (historyCount >= 2) {
    interest = "관객 관심은 검증된 이름과 미술사적 맥락이 분명한 전시에 모이는 중이야.";
  } else if (photoCount >= 2) {
    interest = "관객 관심은 사진과 이미지 기반 전시처럼 직관적으로 읽히면서도 공간감이 있는 전시에 모이는 중이야.";
  }

  let market = "시장적으로는 블록버스터 전시와 상업 갤러리 전시가 동시에 관객의 시간을 나눠 갖는 상황이야.";
  if (galleryCount > museumCount) {
    market = "상위권에서 갤러리 비중이 높아서, 기관 전시보다 삼청·한남·청담 동선의 갤러리 방문성이 더 강하게 보여.";
  } else if (museumCount > galleryCount) {
    market = "상위권에서 미술관 비중이 높아서, 단발성 발견보다 검증된 기관 전시와 큰 규모의 관람 경험이 더 안정적인 선택지로 보여.";
  }

  let reason = "이 흐름은 여름 시즌의 이동 피로 속에서, 관객이 실패 확률 낮고 한 번에 이해되는 전시를 선호하는 상황과도 맞닿아 있어.";
  if (galleryCount >= 5 && topAreas.includes("삼청")) {
    reason = "특히 삼청권 갤러리들이 상위권에 모이면서, 하나의 전시만 보기보다 짧은 반경 안에서 여러 전시를 이어보는 동선형 관심이 강해져.";
  }

  return `현재 ART NOIZ는 ${topAreas || "서울/수도권"} 중심으로 잡혀. Top 10의 핵심 매체는 ${topMediums || "동시대미술"}이고, 구성은 미술관 ${museumCount}개, 갤러리 ${galleryCount}개에 가까워. ${interest} 가장 강한 신호는 ${top.title || "상위 전시"}지만, 단독 목적지라기보다 주변 전시들과 묶어 볼 때 더 설득력 있어 보여. ${market} ${reason}`;
}

async function loadData() {
  try {
    const res = await fetch(`${DATA_URL}?t=${Date.now()}`, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    // weeklyRead is generated after ART Top 10 ranking.
    document.getElementById("creator").textContent = data.creator || "이원준 시니어매니저";
    const items = (data.items || [])
      .filter(isRankable)
      .sort((a, b) => Number(b.noiz || 0) - Number(a.noiz || 0))
      .slice(0, 10)
      .map((item, i) => ({ ...item, rank: i + 1 }));

    keepArtWeeklyTitleFixed();
    document.getElementById("weeklyRead").textContent = buildArtWeeklyAnalysis(items, data);
    document.getElementById("rankList").innerHTML = items.map(renderItem).join("");
  } catch (err) {
    console.warn(`데이터 로드 실패: ${err.message}`);
    document.getElementById("rankList").innerHTML = `
      <article class="card"><div class="rank">!</div><div><h2 class="title">앗, 데이터를 아직 못 불러왔어</h2><p class="desc">로컬 파일로 바로 열면 브라우저 보안 때문에 데이터가 막힐 수 있어. GitHub Pages에 올려서 보면 정상 작동해!</p></div></article>
    `;
  }
}

setupHiddenArtMode();
loadData();
</script>
